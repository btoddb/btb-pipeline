# Caller workflow for this repo (claude-pipeline itself).
# The reusable pipeline lives at btb.yml (workflow_call only); this file
# provides the event triggers so /btbai works on issues and PRs here too.

name: BTB Pipeline

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

concurrency:
  group: btb-${{ github.event.issue.number && 'iss' || 'pull' }}-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  btb:
    uses: ./.github/workflows/btb.yml
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    with:
      maintainer: btoddb
      setup: none
