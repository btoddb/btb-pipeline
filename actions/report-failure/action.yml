name: Report failure
description: >
  Post a comment tagging the maintainer when a pipeline phase fails outright
  (usage/token limit, API error, timeout). Supports both Claude phases
  (reads from execution_file) and GPT/Codex phases (accepts failure-text directly).

inputs:
  number:
    description: Issue or PR number to comment on (gh accepts a PR number too)
    required: true
  phase:
    description: Phase label to show in the comment (e.g. "Planning", "Implementation")
    required: true
  execution-file:
    description: Path to the claude-code-action execution_file (Claude phases only)
    required: false
    default: ""
  failure-text:
    description: >
      Pre-extracted failure text from a GPT/Codex script phase. When set, used
      instead of reading from execution-file. Passed via $GITHUB_OUTPUT from
      scripts/gpt-implement.sh and scripts/gpt-revise.sh.
    required: false
    default: ""
  maintainer:
    description: GitHub username to @-mention in the failure comment
    required: true
  github-token:
    description: Token with issues:write used to post the comment
    required: true

runs:
  using: composite
  steps:
    - name: Report failure
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        EXECUTION_FILE: ${{ inputs.execution-file }}
        FAILURE_TEXT_INPUT: ${{ inputs.failure-text }}
        NUMBER: ${{ inputs.number }}
        PHASE: ${{ inputs.phase }}
        MAINTAINER: ${{ inputs.maintainer }}
      run: |
        set -euo pipefail

        run_url="${GITHUB_SERVER_URL:-https://github.com}/${GITHUB_REPOSITORY:-}/actions/runs/${GITHUB_RUN_ID:-}"

        error_text=""
        if [ -n "${FAILURE_TEXT_INPUT:-}" ]; then
          # GPT/Codex path: caller passed error text directly via $GITHUB_OUTPUT.
          error_text="${FAILURE_TEXT_INPUT}"
        elif [ -n "${EXECUTION_FILE:-}" ] && [ -f "$EXECUTION_FILE" ]; then
          # Claude path: extract from the claude-code-action execution log.
          error_text="$(jq -rs '
              [.. | objects | select(has("is_error") or has("errors") or has("subtype"))]
              | last
              | [.result, (.errors // [] | join("; ")), .subtype, (if .is_error == true then "is_error" else empty end)]
              | map(select(. != null and . != ""))
              | join(" ")
            ' "$EXECUTION_FILE" 2>/dev/null || true)"
          error_text="$(printf '%s' "$error_text" | tr '\n' ' ' | tr -d '`' | cut -c1-300)"
        fi

        # Heuristic classification: matches Claude and OpenAI usage/rate-limit signatures.
        is_usage_limit=false
        if printf '%s' "$error_text" | grep -qiE \
          'usage limit|rate.?limit|quota|token.?limit|exceeded.*usage|429|insufficient_quota|rate_limit_exceeded'; then
          is_usage_limit=true
        fi

        if [ "$is_usage_limit" = true ]; then
          reason="the bot likely hit its usage/token limit"
          advice="Please wait for the limit window to reset, then re-comment \`@btbai ...\` to retry."
        else
          reason="this phase failed"
          advice="Please check the [Actions run](${run_url}) for details, then re-comment \`@btbai ...\` to retry."
        fi

        snippet=""
        [ -n "$error_text" ] && snippet=" Error detail: \`${error_text}\`."

        gh issue comment "$NUMBER" \
          --repo "${GITHUB_REPOSITORY:?}" \
          --body "🤖 @${MAINTAINER} the **${PHASE}** phase failed — ${reason}.${snippet} ${advice}"
