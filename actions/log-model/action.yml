name: Log actual model used
description: >
  Post a comment recording the model id used for a pipeline phase. Supports
  both Claude phases (reads from the claude-code-action execution_file) and
  GPT/Codex phases (accepts the model id directly via the `model` input).

inputs:
  number:
    description: Issue or PR number to comment on (gh accepts a PR number too)
    required: true
  phase:
    description: Phase label to show in the comment (e.g. "Planning", "Implementation")
    required: true
  execution-file:
    description: Path to the claude-code-action execution_file output (Claude phases only)
    required: false
    default: ""
  model:
    description: >
      Model id to report directly. When set, overrides the execution-file lookup.
      Use this for GPT/Codex phases where there is no execution file.
    required: false
    default: ""
  model-prefix:
    description: >
      Prefix used to filter model ids from the execution file (default: "claude").
      Only used when `model` is not set and `execution-file` is provided.
    required: false
    default: "claude"
  effort:
    description: The --effort value the job requested, if any. Recorded alongside the model id.
    required: false
    default: ""
  github-token:
    description: Token with issues:write used to post the comment
    required: true

runs:
  using: composite
  steps:
    - name: Log actual model used
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        EXECUTION_FILE: ${{ inputs.execution-file }}
        NUMBER: ${{ inputs.number }}
        PHASE: ${{ inputs.phase }}
        EFFORT: ${{ inputs.effort }}
        MODEL_OVERRIDE: ${{ inputs.model }}
        MODEL_PREFIX: ${{ inputs.model-prefix }}
      run: |
        set -euo pipefail

        model="unknown"

        if [ -n "${MODEL_OVERRIDE:-}" ]; then
          # Caller supplied the model id directly (GPT/Codex path).
          model="$MODEL_OVERRIDE"
        elif [ -n "${EXECUTION_FILE:-}" ] && [ -f "$EXECUTION_FILE" ]; then
          # Extract from the claude-code-action execution log (Claude path).
          prefix="${MODEL_PREFIX:-claude}"
          found="$(jq -rs \
            --arg prefix "$prefix" \
            '([.. | objects | select(has("model")) | .model | select(startswith($prefix))] | last) // empty' \
            "$EXECUTION_FILE" 2>/dev/null || true)"
          [ -n "$found" ] && model="$found"
        fi

        effort_suffix=""
        [ -n "$EFFORT" ] && effort_suffix=" at \`${EFFORT}\` effort"

        gh issue comment "$NUMBER" \
          --repo "$GITHUB_REPOSITORY" \
          --body "🤖 ${PHASE} ran on model \`${model}\`${effort_suffix}."
